# CI —— push / PR 时自动跑 build + vet + lint。
#
# 设计要点：
#   - 先跑前端 npm build，把产物拷到 internal/webassets/dist/，
#     否则 //go:embed all:dist 会因为目录空而编译失败（跟 Dockerfile
#     里第二阶段的 preprocessing 一致）。
#   - Go 版本对齐 go.mod 里的 1.26.4，`go-version-file` 会自动读。
#   - golangci-lint 用官方 action，缓存自带；配置读 .golangci.yml。
#   - evals 不在这里跑（需要 Ark key）。见 evals.yml 里的 workflow_dispatch。
#
# 未来可加：
#   - 前端 lint / typecheck job（现在 `npm run build` 里的 `tsc -b` 已经兜底 typecheck）
#   - trivy / docker scout 扫 CVE（roadmap §9）
#   - build docker image + push GHCR（roadmap §12）

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 允许在 Actions 页面手动触发一次，方便调试
  workflow_dispatch:

# 同一分支的旧 run 用新 push 覆盖，省 CI 分钟
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Stage web bundle into embed dir
        run: |
          rm -rf internal/webassets/dist
          mkdir -p internal/webassets/dist
          cp -r web/dist/. internal/webassets/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      # 冒烟测试：确认 server 二进制真的能启动（缺 ARK env 会 fail-fast，
      # 我们期待的正是那个 exit code —— 证明启动到了 llm.NewArkModel）。
      #
      # 坑点：bash pipeline 默认取最后一条命令的退出码，`... | tee` 里 tee 一直是 0，
      # 所以 `if server | tee` 永远取 true 分支。用 set +e + $PIPESTATUS 显式取
      # 前半段真实退出码，比 pipefail 更少歧义。
      - name: smoke — server exits fast without Ark env
        run: |
          go build -o /tmp/server ./cmd/server
          set +e
          /tmp/server 2>&1 | tee smoke.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "server should have failed without ARK_API_KEY"; exit 1
          fi
          grep -q "ARK" smoke.log || (echo "smoke log missing ARK env hint"; exit 1)
          echo "smoke ok — server fail-fasts on missing Ark env (exit=$rc)"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 前端产物要先 stage 到 embed 目录，否则 lint 也跑不过（go/analysis 也要能加载 package）
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Stage web bundle into embed dir
        run: |
          rm -rf internal/webassets/dist
          mkdir -p internal/webassets/dist
          cp -r web/dist/. internal/webassets/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # .golangci.yml 里写了 version: "2"，必须用 golangci-lint v2+；
          # golangci-lint-action v7 是首个支持 v2 schema 的版本（v6 会拒 v2.0）。
          #
          # 坑点：`version: v2.0` 会拉到 v2.0.2（2025 上半年 release，用 Go 1.24 编）。
          # 我们 .golangci.yml 里 `go: "1.26"` 高于它的编译 Go 版本，binary 直接拒绝加载配置：
          #   "the Go language version (go1.24) used to build golangci-lint is lower than the targeted Go version (1.26)"
          # 升到 v2.12（2026-05 release）即可 —— 该版本用 Go 1.26+ 编。
          version: v2.12
          args: --timeout=5m
