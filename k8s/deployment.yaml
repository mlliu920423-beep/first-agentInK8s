apiVersion: apps/v1
kind: Deployment
metadata:
  name: eino-demo
  labels: { app: eino-demo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: eino-demo }
  template:
    metadata:
      labels: { app: eino-demo }
    spec:
      containers:
        - name: server
          image: eino-demo:local
          imagePullPolicy: Never          # local-only image; never try to pull from a registry
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AGENTS_DIR
              value: "/agents"
            - name: ARK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ark-secret
                  key: ARK_API_KEY
            - name: ARK_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: ark-secret
                  key: ARK_MODEL_ID
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
