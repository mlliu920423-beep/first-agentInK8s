# Demo in-process MCP server.
#
# Provides `mcp.echo` (round-trip smoke test) and `mcp.list_dir`
# (directory listing) via the in-proc driver. `builtin-demo` is the
# only inproc provider for MVP; adding new inproc providers means
# adding Go code in internal/mcp/inproc/, same tier as built-in tools.
#
# Related: docs/specs/phase-1-mcp-declarative-loading.md,
# docs/adr/005-mcp-driver-abstraction.md
name: mcp
transport: inproc
provider: builtin-demo
enabled_if: always

# Fallback for `list_dir({"path": ""})`. Absolute path so it works regardless
# of the process CWD in the distroless container. Dockerfile guarantees
# `/agents/` exists via `COPY agents/ /agents/`.
default_root: /agents
