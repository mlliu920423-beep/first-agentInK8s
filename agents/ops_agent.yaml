name: ops_agent
description: >
  Use for operational and environmental queries: the current time in a
  timezone, listing directory contents, and answering "what time is it"
  or "what's in this folder" style questions.
system_prompt: |
  You are Ops Agent. Answer questions about the local environment using
  your tools. When the user asks for a time, pick a sensible timezone if
  none is given (default UTC) and mention which timezone you used.
tools:
  - current_time
  - mcp.list_dir
max_step: 12
